Transform: AWS::Serverless-2016-10-31
AWSTemplateFormatVersion: 2010-09-09
Description: Maxi80 iOS app backend service

Globals:
   Function:
      Runtime: provided.al2023
      Architectures:
         - arm64
      Handler: bootstrap
      LoggingConfig:
         LogFormat: JSON
         ApplicationLogLevel: DEBUG
         SystemLogLevel: INFO

Parameters:
   MetadataBucket:
      Type: String
      Description: Name of the S3 bucket used to store collected Icecast metadata and history

Resources:

   # HTTP API with Lambda Authorizer
   Maxi80HttpApi:
      Type: AWS::Serverless::HttpApi
      Properties:
         StageName: $default
         Auth:
            DefaultAuthorizer: ApiKeyAuthorizer
            Authorizers:
               ApiKeyAuthorizer:
                  FunctionArn: !GetAtt AuthorizerLambda.Arn
                  Identity:
                     Headers:
                        - Authorization
                  AuthorizerPayloadFormatVersion: "2.0"
                  EnableSimpleResponses: true

   # Give the HTTP API permission to invoke the authorizer
   AuthorizerPermission:
      Type: AWS::Lambda::Permission
      Properties:
         Action: lambda:InvokeFunction
         FunctionName: !Ref AuthorizerLambda
         Principal: apigateway.amazonaws.com
         SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Maxi80HttpApi}/*"

   # Lambda authorizer function
   AuthorizerLambda:
      Type: AWS::Serverless::Function
      Properties:
         CodeUri: .build/plugins/AWSLambdaPackager/outputs/AWSLambdaPackager/AuthorizerLambda/AuthorizerLambda.zip
         MemorySize: 128
         Timeout: 29
         Environment:
            Variables:
               API_KEY_PARAMETER: /maxi80/api-key
         Policies:
            - Statement:
                - Effect: Allow
                  Action:
                    - ssm:GetParameter
                  Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/maxi80/api-key"
                - Effect: Allow
                  Action:
                    - kms:Decrypt
                  Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm"

   # Lambda business function
   Maxi80Lambda:
      Description: Maxi80 iOS app backend API
      Type: AWS::Serverless::Function
      Properties:
         Environment:
            Variables:
               S3_BUCKET: !Ref MetadataBucket
               KEY_PREFIX: v2
               URL_EXPIRATION: "3600"
         MemorySize: 128
         CodeUri: .build/plugins/AWSLambdaPackager/outputs/AWSLambdaPackager/Maxi80Lambda/Maxi80Lambda.zip
         Policies:
            - Statement:
                - Effect: Allow
                  Action:
                    - s3:GetObject
                    - s3:HeadObject
                  Resource: !Sub "arn:aws:s3:::${MetadataBucket}/*"
                - Effect: Allow
                  Action:
                    - s3:GetBucketLocation
                    - s3:ListBucket
                  Resource: !Sub "arn:aws:s3:::${MetadataBucket}"
         Events:
            HttpApiEvent:
               Type: HttpApi
               Properties:
                  ApiId: !Ref Maxi80HttpApi
                  Path: /{proxy+}
                  Method: ANY

   IcecastMetadataCollector:
      Description: Collects Icecast stream metadata and stores in S3
      Type: AWS::Serverless::Function
      Properties:
         CodeUri: .build/plugins/AWSLambdaPackager/outputs/AWSLambdaPackager/IcecastMetadataCollector/IcecastMetadataCollector.zip
         MemorySize: 128
         Timeout: 115
         Environment:
            Variables:
               STREAM_URL: https://audio1.maxi80.com
               S3_BUCKET: !Ref MetadataBucket
               KEY_PREFIX: v2
               SECRETS: /maxi80/apple-music-key
               MAX_HISTORY_SIZE: 100
         Policies:
            - Statement:
                - Effect: Allow
                  Action:
                    - ssm:GetParameter
                  Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/maxi80/*"
                - Effect: Allow
                  Action:
                    - kms:Decrypt
                  Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm"
                - Effect: Allow
                  Action:
                    - s3:PutObject
                    - s3:HeadObject
                    - s3:GetObject
                  Resource: !Sub "arn:aws:s3:::${MetadataBucket}/*"
                - Effect: Allow
                  Action:
                    - s3:GetBucketLocation
                  Resource: !Sub "arn:aws:s3:::${MetadataBucket}"
         Events:
            ScheduleEvent:
               Type: Schedule
               Properties:
                  Schedule: rate(3 minutes)
                  Enabled: true
      Metadata:
         BuildMethod: makefile

   # SNS Topic for alerts
   Maxi80AlertsTopic:
      Type: AWS::SNS::Topic
      Properties:
         TopicName: Maxi80-API-Alerts
         DisplayName: Maxi80 API Monitoring Alerts

   # CloudWatch Alarm for Lambda errors
   LambdaErrorAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
         AlarmName: Maxi80-Lambda-Errors
         AlarmDescription: Alert when Lambda function has errors
         MetricName: Errors
         Namespace: AWS/Lambda
         Statistic: Sum
         Period: 300
         EvaluationPeriods: 1
         Threshold: 1
         ComparisonOperator: GreaterThanOrEqualToThreshold
         Dimensions:
            - Name: FunctionName
              Value: !Ref Maxi80Lambda
         AlarmActions:
            - !Ref Maxi80AlertsTopic

   # CloudWatch Alarm for Lambda duration (timeout warning)
   LambdaDurationAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
         AlarmName: Maxi80-Lambda-High-Duration
         AlarmDescription: Alert when Lambda execution time is high
         MetricName: Duration
         Namespace: AWS/Lambda
         Statistic: Average
         Period: 300
         EvaluationPeriods: 2
         Threshold: 25000
         ComparisonOperator: GreaterThanThreshold
         Dimensions:
            - Name: FunctionName
              Value: !Ref Maxi80Lambda
         AlarmActions:
            - !Ref Maxi80AlertsTopic

   # CloudWatch Alarm for high request count on HTTP API
   HttpApiHighRequestCountAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
         AlarmName: Maxi80-HttpApi-High-Request-Count
         AlarmDescription: Alert when HTTP API request count is high
         MetricName: Count
         Namespace: AWS/ApiGateway
         Statistic: Sum
         Period: 3600
         EvaluationPeriods: 1
         Threshold: 8000
         ComparisonOperator: GreaterThanThreshold
         Dimensions:
            - Name: ApiId
              Value: !Ref Maxi80HttpApi
         AlarmActions:
            - !Ref Maxi80AlertsTopic

Outputs:
   ApiUrl:
      Description: HTTP API endpoint URL
      Value: !Sub "https://${Maxi80HttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
   AlertsTopicArn:
      Description: SNS Topic ARN for monitoring alerts
      Value: !Ref Maxi80AlertsTopic
